version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_postgres
    environment:
      POSTGRES_DB: trade_perf_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trade_perf_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:securepassword123@postgres:5432/trade_perf_db
      - SESSION_SECRET=supersecure_session_secret_321
      - PORT=5000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
